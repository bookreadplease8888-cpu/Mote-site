<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>男子モテタイプ診断</title>
  <meta name="description" content="6問でわかる男子モテタイプ診断。シェアしやすい結果文つき。">
  <meta property="og:title" content="男子モテタイプ診断">
  <meta property="og:description" content="6問でわかる男子モテタイプ診断。">
  <meta property="og:type" content="website">
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;margin:0;background:#f7f7fb;color:#111}
    .wrap{max-width:720px;margin:0 auto;padding:16px}
    .box{background:#fff;border:1px solid #ddd;border-radius:16px;padding:16px;margin-bottom:14px}
    h1{font-size:28px;line-height:1.2;margin:0 0 8px}
    h2{font-size:18px;margin:0 0 10px}
    .muted{color:#666;font-size:14px}
    .opt{display:block;width:100%;text-align:left;padding:12px 14px;margin:8px 0;border:1px solid #ccc;border-radius:12px;background:#fff;font-size:15px}
    .opt.active{border-color:#7c3aed;background:#f5f0ff}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{padding:14px 18px;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer}
    .primary{background:#7c3aed;color:#fff}
    .ghost{background:#eee;color:#111}
    .hidden{display:none}
    .pill{display:inline-block;background:#fce7f3;color:#be185d;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}
    .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#111;color:#fff;padding:10px 14px;border-radius:999px;font-size:13px;display:none}
    pre{white-space:pre-wrap;background:#f7f7fb;border:1px solid #ddd;border-radius:12px;padding:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <h1>男子モテタイプ診断</h1>
      <div class="muted">6問でわかるシンプル版。結果文をそのままシェアできます。</div>
    </div>

    <div id="questions"></div>

    <div class="box">
      <div class="actions">
        <button class="btn primary" onclick="showResult()">タイプを見る</button>
        <button class="btn ghost" onclick="resetQuiz()">リセット</button>
      </div>
    </div>

    <div id="result" class="box hidden">
      <div class="pill" id="pill">タイプ</div>
      <h2 id="title" style="margin-top:10px;">結果</h2>
      <div id="summary"></div>
      <div style="margin-top:12px;font-weight:700;">シェア文</div>
      <pre id="share"></pre>
      <div class="actions">
        <button class="btn primary" onclick="copyShare()">文面をコピー</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">コピーしました</div>

  <script>
    var data = [
      {key:"q1",title:"Q1. 服を選ぶとき、いちばん近いのは？",options:[
        ["clean","清潔感とサイズ感はかなり意識してる"],
        ["soft","無難だけど、やわらかい雰囲気はある"],
        ["mysterious","シンプルだけど少し個性もある"],
        ["room","服は後回し。あまり考えてない"]
      ]},
      {key:"q2",title:"Q2. 初対面で出やすい印象は？",options:[
        ["soft","話しやすい、やさしそう"],
        ["clean","ちゃんとしてそう、清潔感ある"],
        ["mysterious","落ち着いてる、少し気になる"],
        ["room","印象が薄いかも"]
      ]},
      {key:"q3",title:"Q3. 部屋の雰囲気はどれに近い？",options:[
        ["room","生活感はあるけど、まだ伸ばせそう"],
        ["clean","すっきりしていて整ってる"],
        ["soft","居心地は悪くないと思う"],
        ["mysterious","少しこだわりがあって雰囲気もある"]
      ]},
      {key:"q4",title:"Q4. 香りや身だしなみの意識は？",options:[
        ["clean","かなり気をつけてる"],
        ["soft","最低限はしてる"],
        ["mysterious","さりげなくやってるつもり"],
        ["room","あまり意識してない"]
      ]},
      {key:"q5",title:"Q5. 異性に見せたい自分は？",options:[
        ["soft","一緒にいて安心できる人"],
        ["clean","ちゃんとしてて信頼できる人"],
        ["mysterious","なんか気になる、沼っぽい人"],
        ["room","今から雰囲気を上げたい人"]
      ]},
      {key:"q6",title:"Q6. 今いちばん伸ばしたいのは？",options:[
        ["clean","清潔感"],
        ["soft","話しやすさ・親しみやすさ"],
        ["mysterious","雰囲気・色気"],
        ["room","部屋や全体の雰囲気"]
      ]}
    ];

    var state = {};

    var results = {
      clean:{pill:"清潔感つよめ男子",title:"あなたは 清潔感つよめ男子",summary:"第一印象で『ちゃんとしてる』を取りやすいタイプ。信頼感が強いです。",share:"男子モテタイプ診断やったら『清潔感つよめ男子』だった。\nみんなもやってみて。\n#男子モテタイプ診断"},
      soft:{pill:"彼氏感つよめ男子",title:"あなたは 彼氏感つよめ男子",summary:"話しやすさと安心感が魅力のタイプ。親しみやすさで好印象を取りやすいです。",share:"男子モテタイプ診断やったら『彼氏感つよめ男子』だった。\nちょっと盛れててうれしい。\n#男子モテタイプ診断"},
      mysterious:{pill:"沼りやすい雰囲気男子",title:"あなたは 沼りやすい雰囲気男子",summary:"少しミステリアスで、気になる存在になりやすいタイプです。",share:"男子モテタイプ診断やったら『沼りやすい雰囲気男子』だった。\n言いやすい結果きた。\n#男子モテタイプ診断"},
      room:{pill:"雰囲気覚醒前男子",title:"あなたは 雰囲気覚醒前男子",summary:"伸びしろが大きいタイプ。少し整えるだけで印象差が出やすいです。",share:"男子モテタイプ診断やったら『雰囲気覚醒前男子』だった。\nここから伸びしろしかない。\n#男子モテタイプ診断"}
    };

    function renderQuestions(){
      var root = document.getElementById("questions");
      var html = "";
      for(var i=0;i<data.length;i++){
        var q = data[i];
        html += '<div class="box">';
        html += '<h2>' + q.title + '</h2>';
        for(var j=0;j<q.options.length;j++){
          var opt = q.options[j];
          html += '<button type="button" class="opt" id="' + q.key + '_' + j + '" onclick="pick(\'' + q.key + '\',\'' + opt[0] + '\')">' + opt[1] + '</button>';
        }
        html += '</div>';
      }
      root.innerHTML = html;
    }

    function pick(q, value){
      state[q] = value;
      var buttons = document.querySelectorAll('[id^="' + q + '_"]');
      for(var i=0;i<buttons.length;i++){ buttons[i].classList.remove('active'); }
      var qdata = data.find(function(x){ return x.key===q; });
      for(var j=0;j<qdata.options.length;j++){
        if(qdata.options[j][0]===value){ document.getElementById(q + '_' + j).classList.add('active'); }
      }
    }

    function showToast(msg){
      var t = document.getElementById("toast");
      t.textContent = msg;
      t.style.display = "block";
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(function(){ t.style.display = "none"; }, 1500);
    }

    function showResult(){
      if(Object.keys(state).length < data.length){
        showToast("6問すべて答えてください");
        return;
      }
      var score = {clean:0, soft:0, mysterious:0, room:0};
      for(var k in state){ score[state[k]] += 1; }
      var type = "clean";
      var max = -1;
      for(var name in score){
        if(score[name] > max){ max = score[name]; type = name; }
      }
      var r = results[type];
      document.getElementById("pill").textContent = r.pill;
      document.getElementById("title").textContent = r.title;
      document.getElementById("summary").textContent = r.summary;
      document.getElementById("share").textContent = r.share;
      document.getElementById("result").classList.remove("hidden");
      document.getElementById("result").scrollIntoView({behavior:"smooth", block:"start"});
    }

    function resetQuiz(){
      state = {};
      var buttons = document.querySelectorAll(".opt");
      for(var i=0;i<buttons.length;i++){ buttons[i].classList.remove("active"); }
      document.getElementById("result").classList.add("hidden");
      window.scrollTo({top:0, behavior:"smooth"});
    }

    function copyShare(){
      var text = document.getElementById("share").textContent;
      navigator.clipboard.writeText(text).then(function(){ showToast("コピーしました"); })
      .catch(function(){ showToast("コピーできませんでした"); });
    }

    renderQuestions();
  </script>
</body>
</html>
